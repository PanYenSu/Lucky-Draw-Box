
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年節多功能抽獎系統 - 奢華紅金版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #5d0e0e; /* 更深沉的貴氣紅 */
            background-image: 
                url('https://www.transparenttextures.com/patterns/gold-dust.png'),
                radial-gradient(circle at 50% 50%, #8b1a1a 0%, #4a0a0a 100%);
            color: #fff;
        }
        @keyframes pulse-gold {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px 10px rgba(212, 175, 55, 0.6); }
        }
        .animate-pulse-gold {
            animation: pulse-gold 2s infinite ease-in-out;
        }
        .festive-header {
            background: linear-gradient(to bottom, #7d1c1c, #4a0a0a);
            border-bottom: 4px solid #d4af37;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .gold-border {
            border: 2px solid #d4af37;
        }
        /* 更新為使用者指定的金黃色系 */
        .gold-text {
            color: #E9BF16; /* 備用顏色 */
            background: linear-gradient(to bottom, #E9BF16 0%, #A6870F 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        .stat-card {
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            border-bottom: 8px solid #d4af37;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .stat-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .drawing-rolling {
            animation: rolling 0.05s infinite linear;
        }
        @keyframes rolling {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-3px) scale(1.02); }
            100% { transform: translateY(0) scale(1); }
        }
        .btn-casino {
            background: linear-gradient(to bottom, #c05d2e, #a0522d);
            border-bottom: 4px solid #7a3e1d;
        }
        .btn-casino:active {
            border-bottom: 0;
            transform: translateY(4px);
        }
        .modal-gold {
            background: #fff9c4;
            border: 6px solid #d4af37;
            box-shadow: 0 0 100px rgba(212, 175, 55, 0.5);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.575.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
